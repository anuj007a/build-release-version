name: create-release
run-name: "Release ${{ inputs.release_type || 'major' }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type. Non-main branches are capped at minor.'
        type: choice
        options:
          - minor
          - major
          - hotfix
        default: minor
        required: true
      release_label:
        description: 'Release label'
        type: choice
        options:
          - None
          - Pre-release
          - Latest
        default: Pre-release
        required: true
      hotfix_base:
        description: 'Base tag to hotfix, e.g. v1.1.5 — required only when release_type=hotfix'
        type: string
        required: false
        default: ''
      start_from_tag:
        description: 'Override auto-detection and compute the next tag from this base, e.g. v2.3.0'
        type: string
        required: false
        default: ''
  push:
    branches:
      - main
    # Fires on any push to main (direct commits and PR merges).
    # Auto-release is controlled by AUTO_RELEASE_ON_MERGE repository variable.
    # Settings → Variables → Actions → set AUTO_RELEASE_ON_MERGE=true to enable. Default: disabled.

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Push events only run when the toggle is enabled; manual dispatch always runs.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.AUTO_RELEASE_ON_MERGE == 'true')

    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" .
          git fetch --tags --force

      - name: Compute release parameters
        id: params
        run: |
          # ── Determine release type and label ──────────────────────────────
          if [ "${{ github.event_name }}" = "push" ]; then
            RELEASE_TYPE="major"
            EFFECTIVE_LABEL="Latest"
          else
            RELEASE_TYPE="${{ inputs.release_type }}"
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "master" ]; then
              echo "Branch '$BRANCH' is not main/master — overriding release type to minor"
              RELEASE_TYPE="minor"
            fi
            EFFECTIVE_LABEL="${{ inputs.release_label }}"
          fi

          # ── Versioning scheme ─────────────────────────────────────────────
          #
          #   Major:  vN.0.0        e.g. v1.0.0 → v2.0.0 → v3.0.0
          #   Minor:  vN.S.Q        e.g. v1.1.0 → v1.1.1 → v1.1.99 → v1.2.0
          #             S = series, Q = sequence (0–99); Q rolls at 100 → S++, Q=0
          #             After a new major (v2.0.0) minor always restarts at v2.1.0
          #   Hotfix: vN.S.Q-H      e.g. v1.1.5-1 → v1.1.5-2
          #             H auto-increments per base tag; does not advance the minor line

          # ── Optional override: start from a specific tag ──────────────────
          START_FROM="${{ inputs.start_from_tag }}"
          if [ -n "$START_FROM" ]; then
            if ! echo "$START_FROM" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::start_from_tag must be in vN.M.P format, got: $START_FROM"
              exit 1
            fi
            echo "Using start_from_tag override: $START_FROM"
          fi

          case "$RELEASE_TYPE" in

            major)
              if [ -n "$START_FROM" ]; then
                BASE_TAG="$START_FROM"
              else
                BASE_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
                BASE_TAG="${BASE_TAG:-v0.0.0}"
              fi
              N="${BASE_TAG#v}"; N="${N%%.*}"
              NEW_TAG="v$((N + 1)).0.0"
              ;;

            minor)
              if [ -n "$START_FROM" ]; then
                N="${START_FROM#v}"; N="${N%%.*}"
                REST="${START_FROM#v${N}.}"
                S=$(echo "$REST" | cut -d. -f1)
                Q=$(echo "$REST" | cut -d. -f2)
                if [ "$START_FROM" = "v${N}.0.0" ]; then
                  NEW_TAG="v${N}.1.0"
                else
                  Q=$((Q + 1))
                  if [ "$Q" -ge 100 ]; then S=$((S + 1)); Q=0; fi
                  NEW_TAG="v${N}.${S}.${Q}"
                fi
              else
                LATEST_MAJOR=$(git tag --list 'v[0-9]*' --sort=-version:refname \
                  | grep -E '^v[0-9]+\.0\.0$' | head -n1)
                LATEST_MAJOR="${LATEST_MAJOR:-v1.0.0}"
                N="${LATEST_MAJOR#v}"; N="${N%%.*}"

                LATEST_MINOR=$(git tag --list "v${N}.*" --sort=-version:refname \
                  | grep -E "^v${N}\.[0-9]+\.[0-9]+$" | head -n1)

                if [ -z "$LATEST_MINOR" ] || [ "$LATEST_MINOR" = "v${N}.0.0" ]; then
                  NEW_TAG="v${N}.1.0"
                else
                  REST="${LATEST_MINOR#v${N}.}"
                  S=$(echo "$REST" | cut -d. -f1)
                  Q=$(echo "$REST" | cut -d. -f2)
                  Q=$((Q + 1))
                  if [ "$Q" -ge 100 ]; then S=$((S + 1)); Q=0; fi
                  NEW_TAG="v${N}.${S}.${Q}"
                fi
              fi
              ;;

            hotfix)
              BASE="${{ inputs.hotfix_base }}"
              if [ -z "$BASE" ]; then
                echo "::error::hotfix_base input is required when release_type=hotfix"
                exit 1
              fi
              if ! git tag --list | grep -qxF "$BASE"; then
                echo "::error::Base tag '$BASE' does not exist in this repository"
                exit 1
              fi
              LATEST_HF_NUM=$(git tag --list "${BASE}-*" \
                | grep -oE '[0-9]+$' | sort -n | tail -n1)
              H="${LATEST_HF_NUM:-0}"; H=$((H + 1))
              NEW_TAG="${BASE}-${H}"
              ;;

          esac

          echo "New tag: $NEW_TAG"

          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)

          echo "release_type=$RELEASE_TYPE"      >> "$GITHUB_OUTPUT"
          echo "effective_label=$EFFECTIVE_LABEL" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG"                 >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG"               >> "$GITHUB_OUTPUT"

          {
            echo "### Release Parameters"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag | \`$NEW_TAG\` |"
            echo "| Type | $RELEASE_TYPE |"
            echo "| Label | $EFFECTIVE_LABEL |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.params.outputs.new_tag }}"
          git push origin "${{ steps.params.outputs.new_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.params.outputs.new_tag }}
          PREV_TAG: ${{ steps.params.outputs.prev_tag }}
          EFFECTIVE_LABEL: ${{ steps.params.outputs.effective_label }}
          RELEASE_TYPE: ${{ steps.params.outputs.release_type }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          # ── Fetch auto-generated changelog ────────────────────────────────
          GEN_ARGS=(-f "tag_name=${NEW_TAG}" -f "target_commitish=${{ github.sha }}")
          [ -n "$PREV_TAG" ] && GEN_ARGS+=(-f "previous_tag_name=${PREV_TAG}")
          GENERATED_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST "${GEN_ARGS[@]}" --jq '.body' 2>/dev/null || echo "")

          # ── Write combined release notes ──────────────────────────────────
          {
            echo "## Release Parameters"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag | \`${NEW_TAG}\` |"
            echo "| Type | ${RELEASE_TYPE} |"
            echo "| Label | ${EFFECTIVE_LABEL} |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Commit | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Workflow run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "---"
            echo ""
            printf '%s' "$GENERATED_NOTES"
          } > /tmp/release_notes.md

          # ── Resolve label flags ───────────────────────────────────────────
          case "$EFFECTIVE_LABEL" in
            "Pre-release") IS_PRERELEASE=true;  MAKE_LATEST=false ;;
            "Latest")      IS_PRERELEASE=false; MAKE_LATEST=true  ;;
            *)             IS_PRERELEASE=false; MAKE_LATEST=false ;;
          esac

          # ── Create the release ────────────────────────────────────────────
          # -f sends typed values (bool inference) — correct for prerelease (boolean field)
          # -F sends raw strings — correct for make_latest (string enum: "true"/"false"/"legacy")
          gh api repos/${{ github.repository }}/releases \
            --method POST \
            -F tag_name="${NEW_TAG}" \
            -F name="${NEW_TAG}" \
            -F body="$(cat /tmp/release_notes.md)" \
            -f prerelease="${IS_PRERELEASE}" \
            -F make_latest="${MAKE_LATEST}"
